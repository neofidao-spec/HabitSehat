name: Build and Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Generate keystore (tagged releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          keytool -genkeypair -v \
            -keystore ${{ runner.temp }}/habitsehat.keystore \
            -alias ${{ secrets.KEY_ALIAS || 'habitsehat' }} \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD || 'HabitSehat2026' }} \
            -keypass ${{ secrets.KEY_PASSWORD || 'HabitSehat2026' }} \
            -dname "${{ secrets.KEY_DNAME || 'CN=Fani Hernanda, OU=Development, O=Neofidao, L=Jakarta, ST=DKI Jakarta, C=ID' }}"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HabitSehat-Debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK (signed)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/habitsehat.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'HabitSehat2026' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'habitsehat' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'HabitSehat2026' }}

      - name: Build AAB (Android App Bundle)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/habitsehat.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'HabitSehat2026' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'habitsehat' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'HabitSehat2026' }}

      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: HabitSehat-Release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: HabitSehat-Bundle
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
